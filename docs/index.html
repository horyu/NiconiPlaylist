<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NiconiPlaylist</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #14110f;
        color: #f5f5f4;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        border: 1px solid #44403c;
        border-radius: 24px;
        padding: 32px;
        background: rgba(28, 25, 23, 0.92);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.28);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.8;
        color: #d6d3d1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>NiconiPlaylist</h1>
      <p>
        このページは
        <a href="https://github.com/horyu/NiconiPlaylist">NiconiPlaylist</a>
        の案内用ページです。プレイリストの作成・インポート・再生は、
        ブラウザ拡張機能側から行ってください。
      </p>
    </main>
  </body>
</html>
